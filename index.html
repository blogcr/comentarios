<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comentários ALCR</title>

<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  background: #f5f6f8;
  margin: 0;
  padding: 40px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #ffffff;
  padding: 50px;
  border-radius: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.05);
}

h1{
font-size:24px;
margin-bottom:6px;
}

.admin-item {
  padding: 30px 0;
  border-bottom: 1px solid #eee;
}

.admin-topo {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 15px;
}

.admin-topo strong {
  font-size: 18px;
  color: #333;
  text-transform: uppercase;
}

.admin-data {
  font-size: 14px;
  color: #999;
}

.admin-texto {
  font-size: 18px;
  line-height: 1.6;
  color: #222;
  margin-bottom: 18px;
}

.admin-post {
  font-size: 16px;
  margin-bottom: 6px;
  font-weight:700;
}

.admin-post a {
  color: #B71C1C; 
  text-decoration: none;
  font-weight: 500;
  font-size: 18px; 
}

.admin-post a:hover {
  color: #000000;
  text-decoration: none;
}

.admin-autor-post {
  font-size: 13px;
  color: #888;
  margin-top: 4px;
}

.admin-acoes {
  text-align: right;
  margin-top: 12px;
}

.admin-acoes button {
  background: #f3f3f3;
  border: 1px solid #ddd;
  padding: 6px 14px;
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s ease;
}

.admin-acoes button:hover {
  background: #e8e8e8;
}

.oculto {
  font-size: 13px;
  color: #aaa;
}

/* --- PAGINAÇÃO (acréscimo discreto) --- */

.paginacao {
  margin-top: 40px;
  text-align: center;
}

.paginacao button {
  background: #f3f3f3;
  border: 1px solid #ddd;
  padding: 6px 12px;
  margin: 0 4px;
  font-size: 13px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s ease;
}

.paginacao button:hover {
  background: #e8e8e8;
}

.paginacao button.ativo {
  background: #6f42c1;
  color: #fff;
  border-color: #6f42c1;
}

@media (max-width: 600px) {
  .container {
    padding: 25px;
  }

  .admin-texto {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1 style="margin:0 auto">Comentários ALCR</h1>
  <div id="painelAdmin"></div>
  <div id="paginacao" class="paginacao"></div>
</div>

<script>
(function() {

  var adminURL = "https://script.google.com/macros/s/AKfycbxNRrY5FChcSaYwGaoCsuKso5cz1ATEfjn8ySlmK_V60lNlUWmLTQ8AsibNvKCYlFsX/exec?modo=admin";
  var POR_PAGINA = 30;
  var paginaAtual = 1;
  var listaGlobal = [];

  function formatarData(dataISO) {
    var agora = new Date();
    var data = new Date(dataISO);
    var diff = Math.floor((agora - data) / 1000);

    if (diff < 60) return "agora mesmo";
    if (diff < 3600) {
      var m = Math.floor(diff / 60);
      return "há " + m + (m === 1 ? " minuto" : " minutos");
    }
    if (diff < 86400) {
      var h = Math.floor(diff / 3600);
      return "há " + h + (h === 1 ? " hora" : " horas");
    }

    return data.toLocaleDateString("pt-BR") + ", " +
           data.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  }

  function renderizarPagina() {

    var container = document.getElementById("painelAdmin");
    var paginacao = document.getElementById("paginacao");

    container.innerHTML = "";

    var inicio = (paginaAtual - 1) * POR_PAGINA;
    var fim = inicio + POR_PAGINA;
    var pagina = listaGlobal.slice(inicio, fim);

    pagina.forEach(function(item) {

      var html = ""
        + "<div class='admin-item'>"

          + "<div class='admin-topo'>"
            + "<strong>" + item.nome + "</strong>"
            + "<span class='admin-data'>" + formatarData(item.data) + "</span>"
          + "</div>"

          + "<div class='admin-texto'>"
            + item.comentario
          + "</div>"

          + "<div class='admin-post'>"
            + "<a href='" + item.postId + "' target='_blank'>"
            + item.titulo
            + "</a>"
          + "</div>"

          + (item.autorPost 
              ? "<div class='admin-autor-post'>texto de " + item.autorPost + "</div>"
              : "")

          + "<div class='admin-acoes'>";

      if (item.ativo === true) {
        html += "<button onclick='ocultar(" + item.linha + ")'>Ocultar</button>";
      } else {
        html += "<span class='oculto'>Oculto</span>";
      }

      html += "</div></div>";

      container.insertAdjacentHTML("beforeend", html);

    });

    // renderizar navegação
    var totalPaginas = Math.ceil(listaGlobal.length / POR_PAGINA);
    paginacao.innerHTML = "";

    for (var i = 1; i <= totalPaginas; i++) {
      var btn = document.createElement("button");
      btn.textContent = i;
      if (i === paginaAtual) btn.classList.add("ativo");
      btn.onclick = (function(numero) {
        return function() {
          paginaAtual = numero;
          renderizarPagina();
          window.scrollTo({ top: 0, behavior: "smooth" });
        };
      })(i);
      paginacao.appendChild(btn);
    }
  }

  fetch(adminURL)
    .then(function(r) { return r.json(); })
    .then(function(lista) {

      // ORDEM DECRESCENTE — MAIS RECENTE PRIMEIRO
      lista.sort(function(a, b) {
        return new Date(b.data) - new Date(a.data);
      });

      listaGlobal = lista;
      renderizarPagina();
    });

  window.ocultar = function(linha) {
    fetch("https://script.google.com/macros/s/AKfycbxNRrY5FChcSaYwGaoCsuKso5cz1ATEfjn8ySlmK_V60lNlUWmLTQ8AsibNvKCYlFsX/exec", {
      method: "POST",
      body: JSON.stringify({
        acao: "ocultar",
        linha: linha
      })
    })
    .then(function() {
      location.reload();
    });
  };

})();
</script>

</body>
</html>
